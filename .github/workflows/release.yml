name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: schedulator-linux-x64
          - target: bun-linux-arm64
            artifact: schedulator-linux-arm64
          - target: bun-darwin-x64
            artifact: schedulator-darwin-x64
          - target: bun-darwin-arm64
            artifact: schedulator-darwin-arm64
          - target: bun-windows-x64
            artifact: schedulator-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.1.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun build --compile --minify --target=${{ matrix.target }} src/index.ts --outfile dist/${{ matrix.artifact }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
